name: CI/CD EC2

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ec2-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test And Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --locked

      - name: Run tests
        run: uv run pytest -ra

      - name: Docker build check
        run: docker build -t futurex-reviewer:${{ github.sha }} .

  deploy:
    name: Deploy To EC2
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    env:
      EC2_APP_DIR: ${{ vars.EC2_APP_DIR || '/opt/futurex-reviewer' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate EC2 secrets
        run: |
          set -euo pipefail
          test -n "${{ secrets.EC2_HOST }}" || (echo "::error::Missing secret EC2_HOST" && exit 1)
          test -n "${{ secrets.EC2_USER }}" || (echo "::error::Missing secret EC2_USER" && exit 1)
          test -n "${{ secrets.EC2_SSH_KEY }}" || (echo "::error::Missing secret EC2_SSH_KEY" && exit 1)

      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Package source
        run: |
          set -euo pipefail
          tar \
            --exclude='.git' \
            --exclude='.venv' \
            --exclude='.env' \
            --exclude='.pytest_cache' \
            --exclude='projects' \
            --exclude='graphify-out' \
            -czf /tmp/futurex-reviewer.tar.gz .

      - name: Upload source to EC2
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "sudo mkdir -p '${EC2_APP_DIR}' && sudo chown -R ${{ secrets.EC2_USER }}:${{ secrets.EC2_USER }} '${EC2_APP_DIR}'"
          scp -i ~/.ssh/ec2_key /tmp/futurex-reviewer.tar.gz "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/futurex-reviewer.tar.gz"

      - name: Upload EC2 env file from secret when provided
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          set -euo pipefail
          if [ -n "${ENV_FILE}" ]; then
            printf '%s\n' "${ENV_FILE}" > /tmp/futurex-reviewer.env
            scp -i ~/.ssh/ec2_key /tmp/futurex-reviewer.env "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/futurex-reviewer.env"
          fi

      - name: Deploy with Docker Compose
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "APP_DIR='${EC2_APP_DIR}' bash -s" <<'REMOTE'
          set -Eeuo pipefail
          cd "$APP_DIR"
          tar -xzf /tmp/futurex-reviewer.tar.gz -C "$APP_DIR"

          if [ -f /tmp/futurex-reviewer.env ]; then
            mv /tmp/futurex-reviewer.env "$APP_DIR/.env"
            chmod 600 "$APP_DIR/.env"
          fi

          if [ ! -f "$APP_DIR/.env" ]; then
            echo "::error::Missing $APP_DIR/.env. Create it on EC2 or add GitHub secret ENV_FILE."
            exit 1
          fi

          docker compose -f docker-compose.ec2.yml config
          docker compose -f docker-compose.ec2.yml up -d --build
          docker compose -f docker-compose.ec2.yml ps

          sleep 5
          if ! curl -fsS "http://localhost:${APP_PORT:-8010}/health"; then
            echo "::error::Health check failed. Showing app logs."
            docker compose -f docker-compose.ec2.yml logs --tail=200 app
            exit 1
          fi
          REMOTE

      - name: Show recent app logs
        if: always()
        run: |
          ssh -i ~/.ssh/ec2_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "cd '${EC2_APP_DIR}' && docker compose -f docker-compose.ec2.yml logs --tail=120 app" || true
