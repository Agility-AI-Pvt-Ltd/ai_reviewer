services:
  postgres:
    image: postgres:16-alpine
    container_name: futurex-reviewer-postgres
    environment:
      POSTGRES_USER: futurex
      POSTGRES_PASSWORD: futurex
      POSTGRES_DB: futurex_reviewer
    ports:
      - "${LOCAL_POSTGRES_PORT:-54329}:5432"
    volumes:
      - futurex_reviewer_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U futurex -d futurex_reviewer"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: futurex-reviewer-redis
    ports:
      - "${LOCAL_REDIS_PORT:-63799}:6379"
    volumes:
      - futurex_reviewer_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  futurex_reviewer_postgres_data:
  futurex_reviewer_redis_data:
